<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lidan Meet — Dashboard Pengawas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f1a;
      --bg2: #111827;
      --surface: #161d2e;
      --surface2: #1e2a40;
      --border: #243047;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.25);
      --accent2: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --text: #e8edf5;
      --text-muted: #6b7fa3;
      --text-dim: #3d5170;
      --radius: 14px;
      --radius-sm: 8px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --sidebar-w: 300px;
      --topbar-h: 56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg); color: var(--text);
      height: 100%; overflow: hidden;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events:none; z-index:0;
    }

    /* ══ SCREEN SYSTEM ══ */
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════
       LOGIN SCREEN
    ══════════════════════════════════ */
    #screen-login {
      min-height: 100vh;
      align-items: center; justify-content: center;
      position: relative; z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(59,130,246,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(6,182,212,0.08) 0%, transparent 60%),
        var(--bg);
    }

    .login-box {
      width: 100%; max-width: 380px;
      padding: 44px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .login-brand {
      font-family: var(--font-display);
      font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .login-brand span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-subtitle {
      font-size: 13px; color: var(--text-muted);
      margin-bottom: 32px;
    }

    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted); margin-bottom: 7px;
    }
    .field input {
      width: 100%; padding: 12px 15px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-login {
      width: 100%; padding: 13px;
      background: var(--accent); color: #fff; border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-login:hover { background: #2563eb; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-err {
      font-size: 12px; color: var(--danger);
      margin-top: 10px; min-height: 16px;
    }

    /* ══════════════════════════════════
       MAIN SCREEN
    ══════════════════════════════════ */
    #screen-app {
      flex-direction: column; height: 100vh;
      position: relative; z-index: 1;
    }

    /* TOP BAR */
    .topbar {
      height: var(--topbar-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(11,15,26,0.95);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .brand {
      font-family: var(--font-display);
      font-size: 18px; font-weight: 800;
      letter-spacing: -0.5px;
    }
    .brand span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .role-badge {
      font-size: 11px; font-weight: 500;
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.25);
      color: var(--accent); padding: 3px 10px;
      border-radius: 100px; letter-spacing: 0.5px;
    }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .logged-as {
      font-size: 12px; color: var(--text-muted);
    }
    .btn-sm {
      padding: 6px 14px; border-radius: 7px;
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      transition: all 0.15s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--text-muted); }

    /* MAIN LAYOUT: sidebar + content */
    .main-layout {
      flex: 1; display: flex; overflow: hidden;
    }

    /* ══════════════════════════════════
       CHANNEL TABS BAR
    ══════════════════════════════════ */
    .channel-tabs-bar {
      display: flex; align-items: stretch;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .channel-tabs-bar::-webkit-scrollbar { display: none; }

    .ch-tab {
      display: flex; align-items: center; gap: 8px;
      padding: 0 18px; min-width: 120px;
      height: 42px;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      border: none; background: transparent;
      border-right: 1px solid var(--border);
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
      position: relative;
    }
    .ch-tab:hover { color: var(--text); background: var(--surface); }
    .ch-tab.active {
      color: var(--accent);
      background: var(--surface);
      border-bottom-color: var(--accent);
    }
    .ch-tab .ch-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0; transition: background 0.3s;
    }
    .ch-tab .ch-live-dot.live {
      background: var(--success);
      box-shadow: 0 0 5px var(--success);
      animation: blink 1.5s infinite;
    }
    .ch-tab .ch-queue-badge {
      font-size: 10px; font-weight: 600;
      background: var(--danger); color: #fff;
      border-radius: 100px; padding: 1px 6px;
      min-width: 18px; text-align: center;
      display: none;
    }
    .ch-tab .ch-queue-badge.show { display: inline-block; }

    /* ── SIDEBAR (right) ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden;
      order: 2;
    }

    /* Sidebar channel indicator */
    .sidebar-ch-label {
      padding: 10px 16px 6px;
      font-family: var(--font-display);
      font-size: 12px; font-weight: 700;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-section:last-child { border-bottom: none; flex: 1; overflow: hidden; }
    .sidebar-head {
      padding: 12px 16px;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: var(--text-muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-body { padding: 12px 16px; }

    /* Admin Status Controls */
    .status-controls { display: flex; flex-direction: column; gap: 8px; }
    .status-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg2); color: var(--text);
      font-family: var(--font-body); font-size: 13px;
      cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .status-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .status-btn.active-broadcast {
      background: rgba(245,158,11,0.1);
      border-color: var(--warn); color: var(--warn);
    }
    .status-btn.active-available {
      background: rgba(16,185,129,0.1);
      border-color: var(--success); color: var(--success);
    }

    /* Self status */
    .my-status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: var(--bg2); border-radius: 8px;
      font-size: 13px;
    }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--text-dim); transition: background 0.3s;
      flex-shrink: 0;
    }
    .status-dot.available { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.busy      { background: var(--danger); }
    .status-dot.broadcast { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: blink 1.2s infinite; }
    .status-dot.idle      { background: var(--text-dim); }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    /* Queue panel */
    .queue-list {
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 6px;
      max-height: 260px;
    }
    .queue-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px;
    }
    .queue-pos {
      font-family: var(--font-display);
      font-size: 16px; font-weight: 700;
      color: var(--warn); width: 20px; text-align: center;
      flex-shrink: 0;
    }
    .queue-info { flex: 1; min-width: 0; }
    .queue-name {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .queue-wait {
      font-size: 11px; color: var(--text-muted); margin-top: 2px;
    }
    .queue-actions { display: flex; gap: 5px; }
    .q-btn {
      padding: 5px 9px; border-radius: 6px;
      font-size: 11px; font-weight: 500;
      cursor: pointer; border: 1px solid; transition: all 0.15s;
    }
    .q-btn-private {
      background: rgba(59,130,246,0.1);
      border-color: rgba(59,130,246,0.3); color: var(--accent);
    }
    .q-btn-private:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .q-btn-all {
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.3); color: var(--warn);
    }
    .q-btn-all:hover { background: var(--warn); color: #fff; border-color: var(--warn); }
    .q-btn-skip {
      background: var(--surface2); border-color: var(--border); color: var(--text-muted);
    }
    .q-btn-skip:hover { color: var(--danger); border-color: var(--danger); }

    .empty-queue {
      text-align: center; padding: 20px;
      font-size: 13px; color: var(--text-dim);
    }

    /* ── MAIN CONTENT ── */
    .content-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; order: 1;
    }

    /* Channel panels container */
    .channel-panels {
      flex: 1; position: relative; overflow: hidden;
    }
    .ch-panel {
      display: none;
      flex-direction: column;
      position: absolute; inset: 0;
    }
    .ch-panel.active { display: flex; }

    /* Room join bar */
    .room-join-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .room-join-bar input {
      flex: 1; padding: 9px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-family: var(--font-body); font-size: 13px; outline: none;
    }
    .room-join-bar input:focus { border-color: var(--accent); }
    .btn-join-room {
      padding: 9px 18px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer;
    }
    .btn-join-room:hover { background: #2563eb; }
    .room-active-tag {
      font-size: 12px; color: var(--success);
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.2);
      border-radius: 6px; padding: 3px 10px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex; gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .stat-cell {
      flex: 1; padding: 10px 16px;
      background: var(--surface);
      display: flex; align-items: center; gap: 8px;
      font-size: 13px;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 20px; font-weight: 700;
    }
    .stat-num.green  { color: var(--success); }
    .stat-num.red    { color: var(--danger); }
    .stat-num.yellow { color: var(--warn); }
    .stat-label { font-size: 11px; color: var(--text-muted); }

    /* Jitsi embed for admin */
    .admin-jitsi-wrap {
      flex: 1; position: relative; overflow: hidden;
    }
    .admin-jitsi-container { width: 100%; height: 100%; }
    .admin-loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: var(--bg);
    }
    .admin-loading.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .admin-no-room {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: var(--bg);
      color: var(--text-muted); font-size: 14px;
    }
    .admin-no-room.hidden { display: none; }

    /* Toast */
    #toast-container {
      position: fixed; top: 70px; right: 20px;
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      font-size: 13px; max-width: 280px;
      animation: toastIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.warn    { border-left: 3px solid var(--warn); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes toastIn {
      from { opacity:0; transform: translateX(20px); }
      to   { opacity:1; transform: translateX(0); }
    }

    .count-badge {
      font-size: 11px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text-muted);
      padding: 2px 8px; border-radius: 100px;
    }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LOGIN SCREEN
══════════════════════════════════════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <div class="login-brand">Lidan<span>Meet</span></div>
    <div class="login-subtitle">Dashboard Pengawas — Masuk untuk mulai sesi</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="inp-user" placeholder="username admin" autocomplete="username"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Masuk sebagai Pengawas</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     MAIN SCREEN
══════════════════════════════════════════════ -->
<div class="screen" id="screen-app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">Lidan<span>Meet</span></div>
      <div class="role-badge">🛡️ Pengawas</div>
      <div class="my-status-row" id="my-status-row">
        <div class="status-dot idle" id="my-status-dot"></div>
        <span id="my-status-text">⏸️ Tidak aktif</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="logged-as" id="logged-as-label">—</span>
      <button class="btn-sm" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="main-layout">
    <!-- ── CONTENT AREA ── -->
    <div class="content-area">

      <!-- Channel Tabs -->
      <div class="channel-tabs-bar" id="channel-tabs-bar">
        <!-- Tabs di-render oleh JS -->
      </div>

      <!-- Channel Panels -->
      <div class="channel-panels" id="channel-panels">
        <!-- Panels di-render oleh JS -->
      </div>

    </div>

    <!-- ── SIDEBAR ── -->
    <div class="sidebar">

      <!-- Channel indicator di sidebar -->
      <div class="sidebar-ch-label" id="sidebar-ch-label">— Pilih Channel —</div>

      <!-- Admin Status Controls -->
      <div class="sidebar-section">
        <div class="sidebar-head">Status & Kontrol Audio</div>
        <div class="sidebar-body">
          <div class="status-controls">
            <button class="status-btn" id="btn-broadcast" onclick="toggleBroadcast()">
              <span>📢</span>
              <div>
                <div style="font-weight:500">Bicara ke Semua</div>
                <div style="font-size:11px;color:var(--text-muted)">Unmute mic, semua dengar</div>
              </div>
            </button>
            <button class="status-btn" id="btn-available" onclick="setAvailable()">
              <span>🟢</span>
              <div>
                <div style="font-weight:500">Set Tersedia</div>
                <div style="font-size:11px;color:var(--text-muted)">Terima pertanyaan peserta</div>
              </div>
            </button>
            <button class="status-btn" id="btn-go-idle" onclick="setIdle()">
              <span>⏸️</span>
              <div>
                <div style="font-weight:500">Set Tidak Aktif</div>
                <div style="font-size:11px;color:var(--text-muted)">Tutup sementara pertanyaan</div>
              </div>
            </button>
          </div>
        </div>
      </div>

      <!-- Queue Panel -->
      <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <div class="sidebar-head">
          Antrian Pertanyaan
          <span class="count-badge" id="queue-count-badge">0</span>
        </div>
        <div class="sidebar-body" style="flex:1;overflow-y:auto;padding-top:8px;">
          <div class="queue-list" id="queue-list">
            <div class="empty-queue">Tidak ada antrian saat ini</div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script src="https://8x8.vc/vpaas-magic-cookie-6a0d4b63e58e420781a516524f2d3fd3/external_api.js" async></script>

<script>
  /* ══════════════════════════════════════════════════
     ▶▶  KONFIGURASI CHANNEL — EDIT DI SINI  ◀◀
     Tambah atau kurangi objek di array ini.
     Setiap objek = 1 tab Channel.
     Field:
       id     : string unik (jangan ada spasi)
       label  : nama yang muncul di tab
       color  : warna aksen tab (opsional, pakai CSS color)
  ══════════════════════════════════════════════════ */
  const CHANNELS = [
    { id: 'ch1', label: 'Chanel 1' },
    { id: 'ch2', label: 'Chanel 2' },
    { id: 'ch3', label: 'Chanel 3' },
    { id: 'ch4', label: 'Chanel 4' },
  ];

  /* ══════════════════════════════════════════════════
     CONFIG API
  ══════════════════════════════════════════════════ */
  const API_READ  = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis7';
  const API_WRITE = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis6';
  const BASE_API  = 'https://lidan.co.id/api';
  const AUTH_KEY  = 'admin';
  const TBL_ADMIN = 'admins';
  const POLL_MS   = 2500;

  /* ══════════════════════════════════════════════════
     STATE GLOBAL
  ══════════════════════════════════════════════════ */
  let currentUser  = null;
  let activeChId   = null; // ID channel yang sedang aktif

  // State per-channel disimpan dalam Map
  // chState[id] = { jitsiAPI, roomData, pollInterval, adminStatus,
  //                 isBroadcasting, queue, activeSpeaker }
  const chState = {};

  /* ══════════════════════════════════════════════════
     INIT STATE CHANNEL
  ══════════════════════════════════════════════════ */
  function initChannelState(id) {
    chState[id] = {
      jitsiAPI:       null,
      roomData:       null,
      pollInterval:   null,
      adminStatus:    'idle',
      isBroadcasting: false,
      queue:          [],
      activeSpeaker:  null,
    };
  }

  /* ══════════════════════════════════════════════════
     BUILD UI — TABS & PANELS
  ══════════════════════════════════════════════════ */
  function buildChannelUI() {
    const tabBar  = document.getElementById('channel-tabs-bar');
    const panCont = document.getElementById('channel-panels');
    tabBar.innerHTML  = '';
    panCont.innerHTML = '';

    CHANNELS.forEach((ch, idx) => {
      initChannelState(ch.id);

      // ── TAB ──
      const tab = document.createElement('button');
      tab.className   = 'ch-tab' + (idx === 0 ? ' active' : '');
      tab.id          = `tab-${ch.id}`;
      tab.dataset.chid = ch.id;
      tab.innerHTML   = `
        <span class="ch-live-dot" id="dot-${ch.id}"></span>
        <span>${esc(ch.label)}</span>
        <span class="ch-queue-badge" id="qbadge-${ch.id}">0</span>`;
      tab.onclick     = () => switchChannel(ch.id);
      tabBar.appendChild(tab);

      // ── PANEL ──
      const panel = document.createElement('div');
      panel.className = 'ch-panel' + (idx === 0 ? ' active' : '');
      panel.id        = `panel-${ch.id}`;
      panel.innerHTML = `
        <div class="room-join-bar">
          <input type="text" id="inp-room-${ch.id}"
            placeholder="Nama room / link ujian untuk ${esc(ch.label)}…" />
          <button class="btn-join-room" onclick="handleJoin('${ch.id}')">
            🚀 Gabung
          </button>
          <div class="room-active-tag" id="room-tag-${ch.id}" style="display:none"></div>
        </div>

        <div class="stats-bar">
          <div class="stat-cell">
            <div>
              <div class="stat-num green" id="stat-active-${ch.id}">0</div>
              <div class="stat-label">Peserta Aktif</div>
            </div>
          </div>
          <div class="stat-cell">
            <div>
              <div class="stat-num yellow" id="stat-queue-${ch.id}">0</div>
              <div class="stat-label">Antrian Tanya</div>
            </div>
          </div>
          <div class="stat-cell">
            <div>
              <div class="stat-num red" id="stat-cam-${ch.id}">0</div>
              <div class="stat-label">Kamera Mati</div>
            </div>
          </div>
        </div>

        <div class="admin-jitsi-wrap">
          <div class="admin-no-room" id="noroom-${ch.id}">
            <div style="font-size:40px">📡</div>
            <div>Masukkan nama room dan klik <strong>Gabung</strong></div>
            <div style="font-size:12px;color:var(--text-dim)">${esc(ch.label)}</div>
          </div>
          <div class="admin-loading hidden" id="loading-${ch.id}">
            <div class="spinner"></div>
            <div style="font-size:13px;color:var(--text-muted)">Menghubungkan ke room…</div>
          </div>
          <div class="admin-jitsi-container" id="jitsi-${ch.id}"></div>
        </div>`;
      panCont.appendChild(panel);
    });

    // Aktifkan channel pertama
    if (CHANNELS.length > 0) switchChannel(CHANNELS[0].id);
  }

  /* ══════════════════════════════════════════════════
     SWITCH CHANNEL
  ══════════════════════════════════════════════════ */
  function switchChannel(id) {
    if (activeChId === id) return;
    activeChId = id;

    // Update tabs
    document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`tab-${id}`).classList.add('active');

    // Update panels
    document.querySelectorAll('.ch-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`panel-${id}`).classList.add('active');

    // Update sidebar label
    const ch = CHANNELS.find(c => c.id === id);
    document.getElementById('sidebar-ch-label').textContent =
      ch ? `📺 ${ch.label}` : '—';

    // Update sidebar status buttons & status dot dari state channel ini
    const st = chState[id];
    refreshSidebarForChannel(id);
  }

  /* ──────────────────────────────────────────────────
     Refresh sidebar (status dot + antrian) sesuai channel aktif
  ────────────────────────────────────────────────── */
  function refreshSidebarForChannel(id) {
    const st = chState[id];
    updateMyStatusUI(st.adminStatus);

    // Broadcast button state
    const btnBc = document.getElementById('btn-broadcast');
    const btnAv = document.getElementById('btn-available');
    btnBc.classList.toggle('active-broadcast', st.isBroadcasting);
    btnAv.classList.toggle('active-available',  st.adminStatus === 'available');
    if (st.isBroadcasting) {
      btnBc.innerHTML = `<span>🔇</span><div><div style="font-weight:500">Stop Bicara ke Semua</div><div style="font-size:11px">Klik untuk berhenti</div></div>`;
    } else {
      btnBc.innerHTML = `<span>📢</span><div><div style="font-weight:500">Bicara ke Semua</div><div style="font-size:11px;color:var(--text-muted)">Unmute mic, semua dengar</div></div>`;
    }

    renderQueue(id);
  }

  /* ══════════════════════════════════════════════════
     LOGIN
  ══════════════════════════════════════════════════ */
  async function doLogin() {
    const user = document.getElementById('inp-user').value.trim();
    const pass = document.getElementById('inp-pass').value.trim();
    const err  = document.getElementById('login-err');
    const btn  = document.getElementById('btn-login');
    if (!user || !pass) { err.textContent = 'Username dan password wajib diisi.'; return; }

    btn.disabled = true; btn.textContent = 'Memeriksa…'; err.textContent = '';
    try {
      const res = await apiFetch(
        `${API_READ}?table=${TBL_ADMIN}&x_01_eq=${encodeURIComponent(user)}`,
        { headers: { 'X-Custom-Auth': AUTH_KEY } }
      );
      if (!res.success || res.count === 0) { err.textContent = 'Username tidak ditemukan.'; return; }
      const row = res.data[0];
      if ((row.x_02 || '').trim() !== pass) { err.textContent = 'Password salah.'; return; }
      currentUser = row;
      sessionStorage.setItem('admin_user', user);
      showApp();
    } catch(e) {
      err.textContent = 'Gagal terhubung ke server.';
    } finally {
      btn.disabled = false; btn.textContent = 'Masuk sebagai Pengawas';
    }
  }

  function doLogout() {
    sessionStorage.removeItem('admin_user');
    // Cleanup semua channel
    CHANNELS.forEach(ch => {
      const st = chState[ch.id];
      if (!st) return;
      if (st.jitsiAPI) { try { st.jitsiAPI.dispose(); } catch {} st.jitsiAPI = null; }
      if (st.pollInterval) { clearInterval(st.pollInterval); st.pollInterval = null; }
    });
    currentUser = null;
    document.getElementById('screen-app').classList.remove('active');
    document.getElementById('screen-login').classList.add('active');
  }

  window.addEventListener('load', async () => {
    const saved = sessionStorage.getItem('admin_user');
    if (!saved) return;
    try {
      const res = await apiFetch(
        `${API_READ}?table=${TBL_ADMIN}&x_01_eq=${encodeURIComponent(saved)}`,
        { headers: { 'X-Custom-Auth': AUTH_KEY } }
      );
      if (res.success && res.count > 0) {
        currentUser = res.data[0];
        showApp(); return;
      }
    } catch {}
    sessionStorage.removeItem('admin_user');
  });

  function showApp() {
    document.getElementById('screen-login').classList.remove('active');
    document.getElementById('screen-app').classList.add('active');
    document.getElementById('logged-as-label').textContent = currentUser.x_01;
    buildChannelUI();
  }

  /* ══════════════════════════════════════════════════
     JOIN ROOM (per channel)
  ══════════════════════════════════════════════════ */
  async function handleJoin(chId) {
    const roomInput = document.getElementById(`inp-room-${chId}`).value.trim();
    if (!roomInput) { showToast('Masukkan nama room terlebih dahulu.', 'warn'); return; }

    const st = chState[chId];
    document.getElementById(`noroom-${chId}`).classList.add('hidden');
    document.getElementById(`loading-${chId}`).classList.remove('hidden');

    try {
      const res = await fetch(`${BASE_API}/admin-room`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          roomName:    roomInput,
          displayName: currentUser.x_01 + ' [Pengawas]',
          userEmail:   '',
        }),
        signal: AbortSignal.timeout(8000),
      });
      const data = await res.json();
      if (!data.success || !data.token) {
        document.getElementById(`loading-${chId}`).classList.add('hidden');
        document.getElementById(`noroom-${chId}`).classList.remove('hidden');
        showToast(data.error || 'Gagal mendapatkan token.', 'warn');
        return;
      }
      st.roomData = data;
    } catch(e) {
      document.getElementById(`loading-${chId}`).classList.add('hidden');
      document.getElementById(`noroom-${chId}`).classList.remove('hidden');
      showToast('Tidak dapat terhubung ke server.', 'warn'); return;
    }

    const tag = document.getElementById(`room-tag-${chId}`);
    tag.style.display = '';
    tag.textContent   = '🔴 Live: ' + st.roomData.room.split('/').pop();

    // Tandai tab sebagai live
    document.getElementById(`dot-${chId}`).classList.add('live');

    embedJitsi(chId);
    setTimeout(() => setAdminStatus(chId, 'available'), 2000);
    startPoll(chId);
  }

  /* ══════════════════════════════════════════════════
     JITSI EMBED (per channel)
  ══════════════════════════════════════════════════ */
  function embedJitsi(chId) {
    const st        = chState[chId];
    const container = document.getElementById(`jitsi-${chId}`);
    const loading   = document.getElementById(`loading-${chId}`);

    const tryEmbed = () => {
      if (typeof JitsiMeetExternalAPI === 'undefined') {
        setTimeout(tryEmbed, 400); return;
      }
      const cleanToken = (st.roomData.token || '').replace(/^"|"$/g,'').trim();
      const options = {
        roomName: st.roomData.room,
        width: '100%', height: '100%',
        parentNode: container,
        jwt: cleanToken,
        configOverwrite: {
          startWithAudioMuted: true,
          startWithVideoMuted: false,
          prejoinPageEnabled:  false,
          enableWelcomePage:   false,
          disableModeratorIndicator: false,
          toolbarButtons: [
            'microphone','camera','hangup','tileview',
            'chat','mute-everyone','security',
          ],
        },
        interfaceConfigOverwrite: {
          SHOW_JITSI_WATERMARK:    false,
          SHOW_WATERMARK_FOR_GUESTS: false,
          SHOW_POWERED_BY:         false,
          TOOLBAR_ALWAYS_VISIBLE:  true,
          DEFAULT_BACKGROUND:      '#0b0f1a',
          APP_NAME:                'Lidan Meet',
          DEFAULT_REMOTE_DISPLAY_NAME: 'Peserta',
        },
      };

      if (st.jitsiAPI) { try { st.jitsiAPI.dispose(); } catch {} }
      container.querySelectorAll('iframe').forEach(el => el.remove());
      st.jitsiAPI = new JitsiMeetExternalAPI(st.roomData.domain, options);

      st.jitsiAPI.addEventListener('videoConferenceJoined', () => {
        loading.classList.add('hidden');
        if (activeChId === chId) showToast('Berhasil masuk sebagai pengawas!', 'success');
      });

      st.jitsiAPI.addEventListener('participantJoined', () => {
        const el = document.getElementById(`stat-active-${chId}`);
        el.textContent = parseInt(el.textContent) + 1;
      });

      st.jitsiAPI.addEventListener('participantLeft', () => {
        const el = document.getElementById(`stat-active-${chId}`);
        el.textContent = Math.max(0, parseInt(el.textContent) - 1);
      });

      setTimeout(() => loading.classList.add('hidden'), 8000);
    };
    tryEmbed();
  }

  /* ══════════════════════════════════════════════════
     ADMIN STATUS (per channel aktif)
  ══════════════════════════════════════════════════ */
  async function setAdminStatus(chId, status) {
    const st = chState[chId];
    st.adminStatus = status;
    if (activeChId === chId) updateMyStatusUI(status);
    if (!st.roomData) return;
    await signalSend(chId, 'admin-status', { status });
  }

  async function setAvailable() {
    const id = activeChId; if (!id) return;
    const st = chState[id];
    if (st.isBroadcasting) await stopBroadcast(id);
    await setAdminStatus(id, 'available');
    st.activeSpeaker = null;
    document.getElementById('btn-available').classList.add('active-available');
    document.getElementById('btn-broadcast').classList.remove('active-broadcast');
    showToast('Status: Tersedia. Peserta dapat mengajukan pertanyaan.', 'success');
  }

  async function setIdle() {
    const id = activeChId; if (!id) return;
    const st = chState[id];
    if (st.isBroadcasting) await stopBroadcast(id);
    await setAdminStatus(id, 'idle');
    document.getElementById('btn-available').classList.remove('active-available');
    document.getElementById('btn-broadcast').classList.remove('active-broadcast');
    showToast('Status: Tidak aktif.', 'info');
  }

  async function toggleBroadcast() {
    const id = activeChId; if (!id) return;
    const st = chState[id];
    if (st.isBroadcasting) await stopBroadcast(id);
    else await startBroadcast(id);
  }

  async function startBroadcast(chId) {
    const st = chState[chId];
    st.isBroadcasting = true;
    await setAdminStatus(chId, 'broadcast');
    if (st.jitsiAPI) st.jitsiAPI.executeCommand('toggleAudio');
    document.getElementById('btn-broadcast').classList.add('active-broadcast');
    document.getElementById('btn-broadcast').innerHTML =
      `<span>🔇</span><div><div style="font-weight:500">Stop Bicara ke Semua</div><div style="font-size:11px">Klik untuk berhenti</div></div>`;
    showToast('📢 Siaran ke semua peserta dimulai.', 'warn');
    await signalSend(chId, 'admin-status', { status: 'broadcast', broadcast: true });
  }

  async function stopBroadcast(chId) {
    const st = chState[chId];
    st.isBroadcasting = false;
    if (st.jitsiAPI) st.jitsiAPI.executeCommand('toggleAudio');
    document.getElementById('btn-broadcast').classList.remove('active-broadcast');
    document.getElementById('btn-broadcast').innerHTML =
      `<span>📢</span><div><div style="font-weight:500">Bicara ke Semua</div><div style="font-size:11px;color:var(--text-muted)">Unmute mic, semua dengar</div></div>`;
    await setAdminStatus(chId, 'available');
    await signalSend(chId, 'admin-status', { status: 'available', broadcast: false });
  }

  function updateMyStatusUI(status) {
    const dot  = document.getElementById('my-status-dot');
    const text = document.getElementById('my-status-text');
    dot.className = 'status-dot ' + status;
    const labels = {
      available: '🟢 Tersedia',
      busy:      '🔴 Bicara privat',
      broadcast: '📢 Siaran ke semua',
      idle:      '⏸️ Tidak aktif',
    };
    text.textContent = labels[status] || '⏸️ Tidak aktif';
  }

  /* ══════════════════════════════════════════════════
     ANSWER QUEUE (per channel aktif)
  ══════════════════════════════════════════════════ */
  async function answerPrivate(name) {
    const id = activeChId; if (!id) return;
    const st = chState[id];
    st.activeSpeaker = name;
    await setAdminStatus(id, 'busy');
    document.getElementById('btn-available').classList.remove('active-available');
    await signalSend(id, 'answer-private', { target: name });
    showToast(`📞 Membuka mic ${name} secara privat…`, 'info');
    removeFromQueueLocal(id, name);
  }

  async function answerBroadcast(name) {
    const id = activeChId; if (!id) return;
    removeFromQueueLocal(id, name);
    await startBroadcast(id);
    showToast(`📢 Jawaban untuk ${name} disiarkan ke semua.`, 'warn');
  }

  async function skipQueue(name) {
    const id = activeChId; if (!id) return;
    removeFromQueueLocal(id, name);
    await signalSend(id, 'queue-done', { target: name, skipped: true });
    showToast(`Peserta ${name} dilewati.`, 'info');
    renderQueue(id);
  }

  function removeFromQueueLocal(chId, name) {
    const st = chState[chId];
    st.queue = st.queue.filter(q => q.name !== name);
    updateQueueCountUI(chId, st.queue.length);
    if (activeChId === chId) renderQueue(chId);
  }

  function updateQueueCountUI(chId, count) {
    // Stat di panel
    const statEl = document.getElementById(`stat-queue-${chId}`);
    if (statEl) statEl.textContent = count;
    // Badge di sidebar (hanya channel aktif)
    if (activeChId === chId) {
      document.getElementById('queue-count-badge').textContent = count;
    }
    // Badge di tab
    const badge = document.getElementById(`qbadge-${chId}`);
    if (badge) {
      badge.textContent = count;
      badge.classList.toggle('show', count > 0);
    }
  }

  /* ══════════════════════════════════════════════════
     SIGNAL POLL (per channel)
  ══════════════════════════════════════════════════ */
  function startPoll(chId) {
    const st = chState[chId];
    if (st.pollInterval) clearInterval(st.pollInterval);
    st.pollInterval = setInterval(() => pollSignal(chId), POLL_MS);
    pollSignal(chId);
  }

  async function pollSignal(chId) {
    const st = chState[chId];
    if (!st.roomData) return;
    try {
      const res  = await fetch(
        `${BASE_API}/signal?room=${encodeURIComponent(st.roomData.room)}&role=admin`
      );
      const data = await res.json();
      if (!data.success) return;
      processSignal(chId, data);
    } catch {}
  }

  function processSignal(chId, data) {
    const st = chState[chId];

    if (data.queue) {
      st.queue = data.queue;
      updateQueueCountUI(chId, st.queue.length);
      if (activeChId === chId) renderQueue(chId);
    }

    if (data.participantCount !== undefined) {
      const el = document.getElementById(`stat-active-${chId}`);
      if (el) el.textContent = data.participantCount;
    }

    if (data.camOffCount !== undefined) {
      const el = document.getElementById(`stat-cam-${chId}`);
      if (el) el.textContent = data.camOffCount;
    }
  }

  function renderQueue(chId) {
    const st = chState[chId];
    const el = document.getElementById('queue-list');
    if (!el) return;
    document.getElementById('queue-count-badge').textContent = st.queue.length;

    if (st.queue.length === 0) {
      el.innerHTML = '<div class="empty-queue">Tidak ada antrian saat ini</div>';
      return;
    }
    el.innerHTML = st.queue.map((q, i) => {
      const waitMin = Math.floor((Date.now() - q.joinedAt) / 60000);
      return `
        <div class="queue-item">
          <div class="queue-pos">#${i+1}</div>
          <div class="queue-info">
            <div class="queue-name">${esc(q.name)}</div>
            <div class="queue-wait">Menunggu ${waitMin < 1 ? '<1' : waitMin} menit</div>
          </div>
          <div class="queue-actions">
            <button class="q-btn q-btn-private" onclick="answerPrivate('${esc(q.name)}')">Privat</button>
            <button class="q-btn q-btn-all"     onclick="answerBroadcast('${esc(q.name)}')">Semua</button>
            <button class="q-btn q-btn-skip"    onclick="skipQueue('${esc(q.name)}')">Skip</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ══════════════════════════════════════════════════
     SIGNAL SEND
  ══════════════════════════════════════════════════ */
  async function signalSend(chId, type, payload = {}) {
    const st = chState[chId];
    if (!st || !st.roomData) return null;
    try {
      const res = await fetch(`${BASE_API}/signal`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ type, room: st.roomData.room, sender: 'admin', ...payload }),
      });
      return await res.json();
    } catch { return null; }
  }

  /* ══════════════════════════════════════════════════
     UTILS
  ══════════════════════════════════════════════════ */
  async function apiFetch(url, opts = {}) {
    const r = await fetch(url, opts);
    return r.json();
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg, type = 'info') {
    const c = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className  = `toast ${type}`;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(() => {
      t.style.opacity    = '0';
      t.style.transition = 'opacity 0.3s';
      setTimeout(() => t.remove(), 300);
    }, 4500);
  }
</script>
</body>
