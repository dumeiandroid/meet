<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lidan Meet — Dashboard Pengawas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f1a;
      --bg2: #111827;
      --surface: #161d2e;
      --surface2: #1e2a40;
      --border: #243047;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.25);
      --accent2: #06b6d4;
      --success: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --text: #e8edf5;
      --text-muted: #6b7fa3;
      --text-dim: #3d5170;
      --radius: 14px;
      --radius-sm: 8px;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --sidebar-w: 300px;
      --topbar-h: 56px;
      --api-tabs-h: 44px;
      --ch-tabs-h: 42px;
    }

    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body { height:100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg); color: var(--text);
      height: 100%; overflow: hidden;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events:none; z-index:0;
    }

    .screen { display: none; }
    .screen.active { display: flex; }

    /* ══ LOGIN ══ */
    #screen-login {
      min-height: 100vh;
      align-items: center; justify-content: center;
      position: relative; z-index: 1;
      background:
        radial-gradient(ellipse 80% 60% at 20% 40%, rgba(59,130,246,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 70%, rgba(6,182,212,0.08) 0%, transparent 60%),
        var(--bg);
    }
    .login-box {
      width: 100%; max-width: 380px; padding: 44px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .login-brand {
      font-family: var(--font-display); font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 4px;
    }
    .login-brand span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .login-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    .field label {
      display: block; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-muted); margin-bottom: 7px;
    }
    .field input {
      width: 100%; padding: 12px 15px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: var(--font-body); font-size: 14px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .btn-login {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.2s; margin-top: 4px;
    }
    .btn-login:hover { background: #2563eb; }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .login-err { font-size: 12px; color: var(--danger); margin-top: 10px; min-height: 16px; }

    /* ══ MAIN SCREEN ══ */
    #screen-app {
      flex-direction: column; height: 100vh;
      position: relative; z-index: 1;
    }

    /* TOPBAR */
    .topbar {
      height: var(--topbar-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(11,15,26,0.98);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 50;
    }
    .topbar-left { display: flex; align-items: center; gap: 14px; }
    .brand { font-family: var(--font-display); font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
    .brand span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .role-badge {
      font-size: 11px; font-weight: 500;
      background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
      color: var(--accent); padding: 3px 10px; border-radius: 100px; letter-spacing: 0.5px;
    }
    .my-status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: var(--bg2); border-radius: 8px; font-size: 13px;
    }
    .status-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--text-dim); transition: background 0.3s; flex-shrink: 0;
    }
    .status-dot.available { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.busy      { background: var(--danger); }
    .status-dot.broadcast { background: var(--warn); box-shadow: 0 0 6px var(--warn); animation: blink 1.2s infinite; }
    .status-dot.idle      { background: var(--text-dim); }
    @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .logged-as { font-size: 12px; color: var(--text-muted); }
    .btn-sm {
      padding: 6px 14px; border-radius: 7px;
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted); transition: all 0.15s;
    }
    .btn-sm:hover { color: var(--text); border-color: var(--text-muted); }

    /* MAIN LAYOUT */
    .main-layout { flex: 1; display: flex; overflow: hidden; }

    /* ══════════════════════════════════
       API TABS — LEVEL 1
    ══════════════════════════════════ */
    .api-tabs-bar {
      height: var(--api-tabs-h);
      display: flex; align-items: stretch;
      background: #0d1220;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .api-tabs-bar::-webkit-scrollbar { display: none; }

    .api-tab {
      display: flex; align-items: center; gap: 8px;
      padding: 0 20px; min-width: 130px;
      height: 100%;
      font-family: var(--font-display); font-size: 12px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-dim);
      border: none; background: transparent;
      border-right: 1px solid var(--border);
      border-bottom: 3px solid transparent;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .api-tab:hover { color: var(--text-muted); background: rgba(255,255,255,0.02); }
    .api-tab.active {
      color: var(--accent2);
      background: var(--bg2);
      border-bottom-color: var(--accent2);
    }
    .api-tab .api-live-count {
      font-size: 10px; font-weight: 600;
      background: rgba(6,182,212,0.15);
      border: 1px solid rgba(6,182,212,0.3);
      color: var(--accent2);
      border-radius: 100px; padding: 1px 7px;
      display: none;
    }
    .api-tab .api-live-count.show { display: inline-block; }

    /* ══════════════════════════════════
       CHANNEL TABS — LEVEL 2
    ══════════════════════════════════ */
    .ch-tabs-bar {
      height: var(--ch-tabs-h);
      display: flex; align-items: stretch;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .ch-tabs-bar::-webkit-scrollbar { display: none; }

    .ch-tab {
      display: flex; align-items: center; gap: 8px;
      padding: 0 18px; min-width: 120px; height: 100%;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--text-muted);
      border: none; background: transparent;
      border-right: 1px solid var(--border);
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all 0.15s;
      white-space: nowrap; flex-shrink: 0;
    }
    .ch-tab:hover { color: var(--text); background: var(--surface); }
    .ch-tab.active { color: var(--accent); background: var(--surface); border-bottom-color: var(--accent); }
    .ch-live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-dim); flex-shrink: 0; transition: background 0.3s;
    }
    .ch-live-dot.live {
      background: var(--success); box-shadow: 0 0 5px var(--success);
      animation: blink 1.5s infinite;
    }
    .ch-queue-badge {
      font-size: 10px; font-weight: 600;
      background: var(--danger); color: #fff;
      border-radius: 100px; padding: 1px 6px;
      min-width: 18px; text-align: center; display: none;
    }
    .ch-queue-badge.show { display: inline-block; }

    /* ══ SIDEBAR ══ */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface); border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow: hidden; order: 2;
    }
    .sidebar-ch-label {
      padding: 10px 16px 6px;
      font-family: var(--font-display); font-size: 11px; font-weight: 700;
      letter-spacing: 1px; color: var(--accent2);
      text-transform: uppercase; border-bottom: 1px solid var(--border);
    }
    .sidebar-section { border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .sidebar-section:last-child { border-bottom: none; flex: 1; overflow: hidden; }
    .sidebar-head {
      padding: 12px 16px; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-body { padding: 12px 16px; }

    .status-controls { display: flex; flex-direction: column; gap: 8px; }
    .status-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg2); color: var(--text);
      font-family: var(--font-body); font-size: 13px;
      cursor: pointer; transition: all 0.15s; text-align: left;
    }
    .status-btn:hover { border-color: var(--accent); background: var(--surface2); }
    .status-btn.active-broadcast { background: rgba(245,158,11,0.1); border-color: var(--warn); color: var(--warn); }
    .status-btn.active-available { background: rgba(16,185,129,0.1); border-color: var(--success); color: var(--success); }

    .queue-list { overflow-y: auto; display: flex; flex-direction: column; gap: 6px; max-height: 260px; }
    .queue-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg2);
      border: 1px solid var(--border); border-radius: 10px;
    }
    .queue-pos { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--warn); width: 20px; text-align: center; flex-shrink: 0; }
    .queue-info { flex: 1; min-width: 0; }
    .queue-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .queue-wait { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .queue-actions { display: flex; gap: 5px; }
    .q-btn { padding: 5px 9px; border-radius: 6px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all 0.15s; }
    .q-btn-private { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); color: var(--accent); }
    .q-btn-private:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .q-btn-all { background: rgba(245,158,11,0.1); border-color: rgba(245,158,11,0.3); color: var(--warn); }
    .q-btn-all:hover { background: var(--warn); color: #fff; border-color: var(--warn); }
    .q-btn-skip { background: var(--surface2); border-color: var(--border); color: var(--text-muted); }
    .q-btn-skip:hover { color: var(--danger); border-color: var(--danger); }
    .empty-queue { text-align: center; padding: 20px; font-size: 13px; color: var(--text-dim); }

    /* ══ CONTENT AREA ══ */
    .content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; order: 1; }
    .channel-panels { flex: 1; position: relative; overflow: hidden; }
    .ch-panel { display: none; flex-direction: column; position: absolute; inset: 0; }
    .ch-panel.active { display: flex; }

    .room-join-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; background: var(--bg2);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .room-join-bar input {
      flex: 1; padding: 9px 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-family: var(--font-body); font-size: 13px; outline: none;
    }
    .room-join-bar input:focus { border-color: var(--accent); }
    .btn-join-room {
      padding: 9px 18px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-join-room:hover { background: #2563eb; }
    .room-active-tag {
      font-size: 12px; color: var(--success);
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2);
      border-radius: 6px; padding: 3px 10px;
    }

    .stats-bar { display: flex; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .stat-cell { flex: 1; padding: 10px 16px; background: var(--surface); display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .stat-num { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
    .stat-num.green  { color: var(--success); }
    .stat-num.red    { color: var(--danger); }
    .stat-num.yellow { color: var(--warn); }
    .stat-label { font-size: 11px; color: var(--text-muted); }

    .admin-jitsi-wrap { flex: 1; position: relative; overflow: hidden; }
    .admin-jitsi-container { width: 100%; height: 100%; }
    .admin-loading {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; background: var(--bg);
    }
    .admin-loading.hidden { display: none; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .admin-no-room {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      background: var(--bg); color: var(--text-muted); font-size: 14px;
    }
    .admin-no-room.hidden { display: none; }

    #toast-container {
      position: fixed; top: 70px; right: 20px;
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; font-size: 13px; max-width: 280px;
      animation: toastIn 0.3s ease; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.warn    { border-left: 3px solid var(--warn); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes toastIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
    .count-badge {
      font-size: 11px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); padding: 2px 8px; border-radius: 100px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="login-box">
    <div class="login-brand">Lidan<span>Meet</span></div>
    <div class="login-subtitle">Dashboard Pengawas — Masuk untuk mulai sesi</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="inp-user" placeholder="username admin" autocomplete="username"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button class="btn-login" id="btn-login" onclick="doLogin()">Masuk sebagai Pengawas</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- MAIN -->
<div class="screen" id="screen-app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="brand">Lidan<span>Meet</span></div>
      <div class="role-badge">🛡️ Pengawas</div>
      <div class="my-status-row">
        <div class="status-dot idle" id="my-status-dot"></div>
        <span id="my-status-text">⏸️ Tidak aktif</span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="logged-as" id="logged-as-label">—</span>
      <button class="btn-sm" onclick="doLogout()">Keluar</button>
    </div>
  </div>

  <div class="main-layout">
    <div class="content-area">
      <!-- API TABS LEVEL 1 -->
      <div class="api-tabs-bar" id="api-tabs-bar"></div>
      <!-- CHANNEL TABS LEVEL 2 -->
      <div class="ch-tabs-bar" id="ch-tabs-bar"></div>
      <!-- PANELS -->
      <div class="channel-panels" id="channel-panels"></div>
    </div>

    <div class="sidebar">
      <div class="sidebar-ch-label" id="sidebar-ch-label">— Pilih Channel —</div>
      <div class="sidebar-section">
        <div class="sidebar-head">Status & Kontrol Audio</div>
        <div class="sidebar-body">
          <div class="status-controls">
            <button class="status-btn" id="btn-broadcast" onclick="toggleBroadcast()">
              <span>📢</span>
              <div>
                <div style="font-weight:500">Bicara ke Semua</div>
                <div style="font-size:11px;color:var(--text-muted)">Unmute mic, semua dengar</div>
              </div>
            </button>
            <button class="status-btn" id="btn-available" onclick="setAvailable()">
              <span>🟢</span>
              <div>
                <div style="font-weight:500">Set Tersedia</div>
                <div style="font-size:11px;color:var(--text-muted)">Terima pertanyaan peserta</div>
              </div>
            </button>
            <button class="status-btn" id="btn-go-idle" onclick="setIdle()">
              <span>⏸️</span>
              <div>
                <div style="font-weight:500">Set Tidak Aktif</div>
                <div style="font-size:11px;color:var(--text-muted)">Tutup sementara pertanyaan</div>
              </div>
            </button>
          </div>
        </div>
      </div>
      <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
        <div class="sidebar-head">
          Antrian Pertanyaan
          <span class="count-badge" id="queue-count-badge">0</span>
        </div>
        <div class="sidebar-body" style="flex:1;overflow-y:auto;padding-top:8px;">
          <div class="queue-list" id="queue-list">
            <div class="empty-queue">Tidak ada antrian saat ini</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<!-- ✅ FIX 1: Script Jitsi api1 di-load statis agar pasti tersedia saat halaman dibuka -->

    ],
  },

  /* ── API 3 ── KERANGKA (isi manual) ── */
  {

/* ════════════════════════════════════════════════════════════
   CONFIG API SERVER (sama untuk semua API)
════════════════════════════════════════════════════════════ */
const API_READ  = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis7';
const API_WRITE = 'https://lidan-co-id.pages.dev/api/contacts_filter_dinamis6';
const BASE_API  = 'https://lidan.co.id/api';
const AUTH_KEY  = 'admin';
const TBL_ADMIN = 'admins';
const POLL_MS   = 2500;

/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
let currentUser = null;
let activeApiId = null;   // API tab aktif
let activeChKey = null;   // key unik = "apiId::chId"

// State per channel disimpan dengan key "apiId::chId"
const chState = {};

// Script Jitsi yang sudah di-load (set of scriptUrl)
const loadedScripts = new Set();

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
function initAllStates() {
  APIS.forEach(api => {
    api.channels.forEach(ch => {
      const key = `${api.id}::${ch.id}`;
      chState[key] = {
        jitsiAPI: null, roomData: null, pollInterval: null,
        adminStatus: 'idle', isBroadcasting: false,
        queue: [], activeSpeaker: null,
      };
    });
  });
}

/* ════════════════════════════════════════════════════════════
   BUILD UI
════════════════════════════════════════════════════════════ */
function buildUI() {
  buildApiTabs();
  // ✅ FIX: Build semua panel untuk semua API di awal — panel tidak akan di-destroy saat switch tab
  APIS.forEach(api => buildChannelTabsAndPanels(api.id));
  switchApi(APIS[0].id); // aktifkan API pertama
}

function buildAllPanels() {
  APIS.forEach(api => {
    buildChannelTabsAndPanels(api.id, true); // true = silent, tidak clear container
  });
}

function buildApiTabs() {
  const bar = document.getElementById('api-tabs-bar');
  bar.innerHTML = '';
  APIS.forEach((api, i) => {
    const tab = document.createElement('button');
    tab.className    = 'api-tab' + (i === 0 ? ' active' : '');
    tab.id           = `api-tab-${api.id}`;
    tab.dataset.apiid = api.id;
    tab.innerHTML    = `
      <span>${esc(api.label)}</span>
      <span class="api-live-count" id="api-live-${api.id}">0 live</span>`;
    tab.onclick = () => switchApi(api.id);
    bar.appendChild(tab);
  });
}

// ✅ FIX 2: buildChannelTabsAndPanels hanya membuat panel (tidak tab channel),
// semua panel dari semua API ada di DOM sekaligus — show/hide saat switch.
// data-apiid disimpan di panel agar mudah difilter.
function buildChannelTabsAndPanels(apiId) {
  const api     = APIS.find(a => a.id === apiId);
  const panCont = document.getElementById('channel-panels');

  api.channels.forEach(ch => {
    const key = `${apiId}::${ch.id}`;
    // Jangan buat ulang jika sudah ada
    if (document.getElementById(`panel-${key}`)) return;

    const panel = document.createElement('div');
    panel.className      = 'ch-panel'; // tidak active dulu
    panel.id             = `panel-${key}`;
    panel.dataset.apiid  = apiId;       // ✅ tandai milik API mana
    panel.innerHTML = `
      <div class="room-join-bar">
        <input type="text" id="inp-room-${key}"
          placeholder="Nama room untuk ${esc(api.label)} › ${esc(ch.label)}…" />
        <button class="btn-join-room" onclick="handleJoin('${apiId}','${ch.id}')">
          🚀 Gabung
        </button>
        <div class="room-active-tag" id="room-tag-${key}" style="display:none"></div>
      </div>
      <div class="stats-bar">
        <div class="stat-cell"><div>
          <div class="stat-num green" id="stat-active-${key}">0</div>
          <div class="stat-label">Peserta Aktif</div>
        </div></div>
        <div class="stat-cell"><div>
          <div class="stat-num yellow" id="stat-queue-${key}">0</div>
          <div class="stat-label">Antrian Tanya</div>
        </div></div>
        <div class="stat-cell"><div>
          <div class="stat-num red" id="stat-cam-${key}">0</div>
          <div class="stat-label">Kamera Mati</div>
        </div></div>
      </div>
      <div class="admin-jitsi-wrap">
        <div class="admin-no-room" id="noroom-${key}">
          <div style="font-size:40px">📡</div>
          <div>Masukkan nama room dan klik <strong>Gabung</strong></div>
          <div style="font-size:12px;color:var(--text-dim)">${esc(api.label)} › ${esc(ch.label)}</div>
        </div>
        <div class="admin-loading hidden" id="loading-${key}">
          <div class="spinner"></div>
          <div style="font-size:13px;color:var(--text-muted)">Menghubungkan ke room…</div>
        </div>
        <div class="admin-jitsi-container" id="jitsi-${key}"></div>
      </div>`;
    panCont.appendChild(panel);
  });
}

// ✅ FIX 2b: Build tab channel (Level 2) sesuai API yang aktif
function buildChannelTabs(apiId) {
  const api    = APIS.find(a => a.id === apiId);
  const chBar  = document.getElementById('ch-tabs-bar');
  chBar.innerHTML = '';

  api.channels.forEach((ch, i) => {
    const key = `${apiId}::${ch.id}`;
    const tab = document.createElement('button');
    tab.className = 'ch-tab' + (i === 0 ? ' active' : '');
    tab.id        = `ch-tab-${key}`;
    tab.innerHTML = `
      <span class="ch-live-dot" id="dot-${key}"></span>
      <span>${esc(ch.label)}</span>
      <span class="ch-queue-badge" id="qbadge-${key}">0</span>`;
    tab.onclick = () => switchChannel(apiId, ch.id);
    chBar.appendChild(tab);

    // Sync badge dengan state yang ada
    const st = chState[key];
    if (st && st.queue.length > 0) {
      tab.querySelector('.ch-queue-badge').textContent = st.queue.length;
      tab.querySelector('.ch-queue-badge').classList.add('show');
    }
    if (st && st.roomData) {
      tab.querySelector('.ch-live-dot').classList.add('live');
    }
  });
}

/* ════════════════════════════════════════════════════════════
   SWITCH API (Level 1) — ✅ tidak rebuild panel, hanya show/hide
════════════════════════════════════════════════════════════ */
function switchApi(apiId) {
  // ✅ Tidak ada early return — perlu jalan saat init juga
  activeApiId = apiId;

  // Update API tabs
  document.querySelectorAll('.api-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`api-tab-${apiId}`).classList.add('active');

  // Sembunyikan semua panel, tampilkan hanya panel milik API ini
  document.querySelectorAll('.ch-panel').forEach(p => p.classList.remove('active'));

  // Rebuild tab channel Level 2 sesuai API aktif
  buildChannelTabs(apiId);

  // Load script Jitsi API ini jika belum
  const api = APIS.find(a => a.id === apiId);
  loadJitsiScript(api.scriptUrl);

  // Switch ke channel pertama
  activeChKey = null;
  switchChannel(apiId, api.channels[0].id);
}

/* ════════════════════════════════════════════════════════════
   SWITCH CHANNEL (Level 2)
════════════════════════════════════════════════════════════ */
function switchChannel(apiId, chId) {
  const key = `${apiId}::${chId}`;
  if (activeChKey === key) return;
  activeChKey = key;

  // Update channel tabs
  document.querySelectorAll('.ch-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById(`ch-tab-${key}`);
  if (tabEl) tabEl.classList.add('active');

  // Update panels
  document.querySelectorAll('.ch-panel').forEach(p => p.classList.remove('active'));
  const panEl = document.getElementById(`panel-${key}`);
  if (panEl) panEl.classList.add('active');

  // Sidebar label
  const api = APIS.find(a => a.id === apiId);
  const ch  = api.channels.find(c => c.id === chId);
  document.getElementById('sidebar-ch-label').textContent =
    `📺 ${api.label} › ${ch.label}`;

  refreshSidebar(key);
}

function refreshSidebar(key) {
  const st = chState[key];
  if (!st) return;
  updateMyStatusUI(st.adminStatus);

  const btnBc = document.getElementById('btn-broadcast');
  const btnAv = document.getElementById('btn-available');
  btnBc.classList.toggle('active-broadcast', st.isBroadcasting);
  btnAv.classList.toggle('active-available',  st.adminStatus === 'available');
  btnBc.innerHTML = st.isBroadcasting
    ? `<span>🔇</span><div><div style="font-weight:500">Stop Bicara ke Semua</div><div style="font-size:11px">Klik untuk berhenti</div></div>`
    : `<span>📢</span><div><div style="font-weight:500">Bicara ke Semua</div><div style="font-size:11px;color:var(--text-muted)">Unmute mic, semua dengar</div></div>`;

  renderQueue(key);
}

/* ════════════════════════════════════════════════════════════
   LOAD SCRIPT JITSI (lazy, per API)
════════════════════════════════════════════════════════════ */
function loadJitsiScript(url) {
  if (loadedScripts.has(url)) return;
  loadedScripts.add(url);
  const s  = document.createElement('script');
  s.src    = url;
  s.async  = true;
  document.head.appendChild(s);
}

/* ════════════════════════════════════════════════════════════
   LOGIN
════════════════════════════════════════════════════════════ */
async function doLogin() {
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value.trim();
  const err  = document.getElementById('login-err');
  const btn  = document.getElementById('btn-login');
  if (!user || !pass) { err.textContent = 'Username dan password wajib diisi.'; return; }

  btn.disabled = true; btn.textContent = 'Memeriksa…'; err.textContent = '';
  try {
    const res = await apiFetch(
      `${API_READ}?table=${TBL_ADMIN}&x_01_eq=${encodeURIComponent(user)}`,
      { headers: { 'X-Custom-Auth': AUTH_KEY } }
    );
    if (!res.success || res.count === 0) { err.textContent = 'Username tidak ditemukan.'; return; }
    const row = res.data[0];
    if ((row.x_02 || '').trim() !== pass) { err.textContent = 'Password salah.'; return; }
    currentUser = row;
    sessionStorage.setItem('admin_user', user);
    showApp();
  } catch {
    err.textContent = 'Gagal terhubung ke server.';
  } finally {
    btn.disabled = false; btn.textContent = 'Masuk sebagai Pengawas';
  }
}

function doLogout() {
  sessionStorage.removeItem('admin_user');
  Object.keys(chState).forEach(key => {
    const st = chState[key];
    if (st.jitsiAPI)     { try { st.jitsiAPI.dispose(); } catch {} st.jitsiAPI = null; }
    if (st.pollInterval) { clearInterval(st.pollInterval); st.pollInterval = null; }
  });
  currentUser = null; activeApiId = null; activeChKey = null;
  document.getElementById('screen-app').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
}

window.addEventListener('load', async () => {
  initAllStates();
  const saved = sessionStorage.getItem('admin_user');
  if (!saved) return;
  try {
    const res = await apiFetch(
      `${API_READ}?table=${TBL_ADMIN}&x_01_eq=${encodeURIComponent(saved)}`,
      { headers: { 'X-Custom-Auth': AUTH_KEY } }
    );
    if (res.success && res.count > 0) { currentUser = res.data[0]; showApp(); return; }
  } catch {}
  sessionStorage.removeItem('admin_user');
});

function showApp() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-app').classList.add('active');
  document.getElementById('logged-as-label').textContent = currentUser.x_01;
  buildUI();
}

/* ════════════════════════════════════════════════════════════
   JOIN ROOM
════════════════════════════════════════════════════════════ */
async function handleJoin(apiId, chId) {
  const key      = `${apiId}::${chId}`;
  const roomInput = document.getElementById(`inp-room-${key}`).value.trim();
  if (!roomInput) { showToast('Masukkan nama room terlebih dahulu.', 'warn'); return; }

  const st = chState[key];
  document.getElementById(`noroom-${key}`).classList.add('hidden');
  document.getElementById(`loading-${key}`).classList.remove('hidden');

  try {
    const res  = await fetch(`${BASE_API}/admin-room`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        roomName:    roomInput,
        displayName: currentUser.x_01 + ' [Pengawas]',
        userEmail:   '',
      }),
      signal: AbortSignal.timeout(8000),
    });
    const data = await res.json();
    if (!data.success || !data.token) {
      document.getElementById(`loading-${key}`).classList.add('hidden');
      document.getElementById(`noroom-${key}`).classList.remove('hidden');
      showToast(data.error || 'Gagal mendapatkan token.', 'warn'); return;
    }
    st.roomData = data;
  } catch {
    document.getElementById(`loading-${key}`).classList.add('hidden');
    document.getElementById(`noroom-${key}`).classList.remove('hidden');
    showToast('Tidak dapat terhubung ke server.', 'warn'); return;
  }

  const tag = document.getElementById(`room-tag-${key}`);
  tag.style.display = ''; tag.textContent = '🔴 Live: ' + st.roomData.room.split('/').pop();
  document.getElementById(`dot-${key}`).classList.add('live');

  updateApiLiveCount(apiId);
  embedJitsi(apiId, chId);
  setTimeout(() => setAdminStatus(key, 'available'), 2000);
  startPoll(key);
}

/* ════════════════════════════════════════════════════════════
   JITSI EMBED
════════════════════════════════════════════════════════════ */
function embedJitsi(apiId, chId) {
  const key       = `${apiId}::${chId}`;
  const api       = APIS.find(a => a.id === apiId);
  const st        = chState[key];
  const container = document.getElementById(`jitsi-${key}`);
  const loading   = document.getElementById(`loading-${key}`);

  const tryEmbed = () => {
    if (typeof JitsiMeetExternalAPI === 'undefined') { setTimeout(tryEmbed, 400); return; }
    const cleanToken = (st.roomData.token || '').replace(/^"|"$/g,'').trim();
    const options = {
      roomName: st.roomData.room,
      width: '100%', height: '100%',
      parentNode: container,
      jwt: cleanToken,
      configOverwrite: {
        startWithAudioMuted: true, startWithVideoMuted: false,
        prejoinPageEnabled: false, enableWelcomePage: false,
        disableModeratorIndicator: false,
        toolbarButtons: ['microphone','camera','hangup','tileview','chat','mute-everyone','security'],
      },
      interfaceConfigOverwrite: {
        SHOW_JITSI_WATERMARK: false, SHOW_WATERMARK_FOR_GUESTS: false,
        SHOW_POWERED_BY: false, TOOLBAR_ALWAYS_VISIBLE: true,
        DEFAULT_BACKGROUND: '#0b0f1a', APP_NAME: 'Lidan Meet',
        DEFAULT_REMOTE_DISPLAY_NAME: 'Peserta',
      },
    };

    if (st.jitsiAPI) { try { st.jitsiAPI.dispose(); } catch {} }
    container.querySelectorAll('iframe').forEach(el => el.remove());
    st.jitsiAPI = new JitsiMeetExternalAPI(st.roomData.domain, options);

    st.jitsiAPI.addEventListener('videoConferenceJoined', () => {
      loading.classList.add('hidden');
      if (activeChKey === key) showToast('Berhasil masuk sebagai pengawas!', 'success');
    });
    st.jitsiAPI.addEventListener('participantJoined', () => {
      const el = document.getElementById(`stat-active-${key}`);
      if (el) el.textContent = parseInt(el.textContent) + 1;
    });
    st.jitsiAPI.addEventListener('participantLeft', () => {
      const el = document.getElementById(`stat-active-${key}`);
      if (el) el.textContent = Math.max(0, parseInt(el.textContent) - 1);
    });
    setTimeout(() => loading.classList.add('hidden'), 8000);
  };
  tryEmbed();
}

/* ════════════════════════════════════════════════════════════
   ADMIN STATUS
════════════════════════════════════════════════════════════ */
async function setAdminStatus(key, status) {
  const st = chState[key];
  st.adminStatus = status;
  if (activeChKey === key) updateMyStatusUI(status);
  if (!st.roomData) return;
  await signalSend(key, 'admin-status', { status });
}

async function setAvailable() {
  if (!activeChKey) return;
  const st = chState[activeChKey];
  if (st.isBroadcasting) await stopBroadcast(activeChKey);
  await setAdminStatus(activeChKey, 'available');
  st.activeSpeaker = null;
  document.getElementById('btn-available').classList.add('active-available');
  document.getElementById('btn-broadcast').classList.remove('active-broadcast');
  showToast('Status: Tersedia. Peserta dapat mengajukan pertanyaan.', 'success');
}

async function setIdle() {
  if (!activeChKey) return;
  const st = chState[activeChKey];
  if (st.isBroadcasting) await stopBroadcast(activeChKey);
  await setAdminStatus(activeChKey, 'idle');
  document.getElementById('btn-available').classList.remove('active-available');
  document.getElementById('btn-broadcast').classList.remove('active-broadcast');
  showToast('Status: Tidak aktif.', 'info');
}

async function toggleBroadcast() {
  if (!activeChKey) return;
  chState[activeChKey].isBroadcasting ? await stopBroadcast(activeChKey) : await startBroadcast(activeChKey);
}

async function startBroadcast(key) {
  const st = chState[key];
  st.isBroadcasting = true;
  await setAdminStatus(key, 'broadcast');
  if (st.jitsiAPI) st.jitsiAPI.executeCommand('toggleAudio');
  document.getElementById('btn-broadcast').classList.add('active-broadcast');
  document.getElementById('btn-broadcast').innerHTML =
    `<span>🔇</span><div><div style="font-weight:500">Stop Bicara ke Semua</div><div style="font-size:11px">Klik untuk berhenti</div></div>`;
  showToast('📢 Siaran ke semua peserta dimulai.', 'warn');
  await signalSend(key, 'admin-status', { status: 'broadcast', broadcast: true });
}

async function stopBroadcast(key) {
  const st = chState[key];
  st.isBroadcasting = false;
  if (st.jitsiAPI) st.jitsiAPI.executeCommand('toggleAudio');
  document.getElementById('btn-broadcast').classList.remove('active-broadcast');
  document.getElementById('btn-broadcast').innerHTML =
    `<span>📢</span><div><div style="font-weight:500">Bicara ke Semua</div><div style="font-size:11px;color:var(--text-muted)">Unmute mic, semua dengar</div></div>`;
  await setAdminStatus(key, 'available');
  await signalSend(key, 'admin-status', { status: 'available', broadcast: false });
}

function updateMyStatusUI(status) {
  const dot  = document.getElementById('my-status-dot');
  const text = document.getElementById('my-status-text');
  dot.className = 'status-dot ' + status;
  const labels = { available:'🟢 Tersedia', busy:'🔴 Bicara privat', broadcast:'📢 Siaran ke semua', idle:'⏸️ Tidak aktif' };
  text.textContent = labels[status] || '⏸️ Tidak aktif';
}

/* ════════════════════════════════════════════════════════════
   QUEUE
════════════════════════════════════════════════════════════ */
async function answerPrivate(name) {
  if (!activeChKey) return;
  const st = chState[activeChKey];
  st.activeSpeaker = name;
  await setAdminStatus(activeChKey, 'busy');
  document.getElementById('btn-available').classList.remove('active-available');
  await signalSend(activeChKey, 'answer-private', { target: name });
  showToast(`📞 Membuka mic ${name} secara privat…`, 'info');
  removeFromQueueLocal(activeChKey, name);
}

async function answerBroadcast(name) {
  if (!activeChKey) return;
  removeFromQueueLocal(activeChKey, name);
  await startBroadcast(activeChKey);
  showToast(`📢 Jawaban untuk ${name} disiarkan ke semua.`, 'warn');
}

async function skipQueue(name) {
  if (!activeChKey) return;
  removeFromQueueLocal(activeChKey, name);
  await signalSend(activeChKey, 'queue-done', { target: name, skipped: true });
  showToast(`Peserta ${name} dilewati.`, 'info');
}

function removeFromQueueLocal(key, name) {
  const st = chState[key];
  st.queue = st.queue.filter(q => q.name !== name);
  updateQueueUI(key, st.queue.length);
  if (activeChKey === key) renderQueue(key);
}

function updateQueueUI(key, count) {
  const statEl = document.getElementById(`stat-queue-${key}`);
  if (statEl) statEl.textContent = count;
  if (activeChKey === key) document.getElementById('queue-count-badge').textContent = count;
  const badge = document.getElementById(`qbadge-${key}`);
  if (badge) { badge.textContent = count; badge.classList.toggle('show', count > 0); }
}

function updateApiLiveCount(apiId) {
  const api   = APIS.find(a => a.id === apiId);
  const count = api.channels.filter(ch => chState[`${apiId}::${ch.id}`]?.roomData).length;
  const el    = document.getElementById(`api-live-${apiId}`);
  if (el) { el.textContent = `${count} live`; el.classList.toggle('show', count > 0); }
}

/* ════════════════════════════════════════════════════════════
   SIGNAL POLL
════════════════════════════════════════════════════════════ */
function startPoll(key) {
  const st = chState[key];
  if (st.pollInterval) clearInterval(st.pollInterval);
  st.pollInterval = setInterval(() => pollSignal(key), POLL_MS);
  pollSignal(key);
}

async function pollSignal(key) {
  const st = chState[key];
  if (!st.roomData) return;
  try {
    const res  = await fetch(`${BASE_API}/signal?room=${encodeURIComponent(st.roomData.room)}&role=admin`);
    const data = await res.json();
    if (!data.success) return;
    if (data.queue) {
      st.queue = data.queue;
      updateQueueUI(key, st.queue.length);
      if (activeChKey === key) renderQueue(key);
    }
    if (data.participantCount !== undefined) {
      const el = document.getElementById(`stat-active-${key}`);
      if (el) el.textContent = data.participantCount;
    }
    if (data.camOffCount !== undefined) {
      const el = document.getElementById(`stat-cam-${key}`);
      if (el) el.textContent = data.camOffCount;
    }
  } catch {}
}

function renderQueue(key) {
  const st = chState[key];
  const el = document.getElementById('queue-list');
  if (!el) return;
  document.getElementById('queue-count-badge').textContent = st.queue.length;
  if (st.queue.length === 0) {
    el.innerHTML = '<div class="empty-queue">Tidak ada antrian saat ini</div>'; return;
  }
  el.innerHTML = st.queue.map((q, i) => {
    const waitMin = Math.floor((Date.now() - q.joinedAt) / 60000);
    return `
      <div class="queue-item">
        <div class="queue-pos">#${i+1}</div>
        <div class="queue-info">
          <div class="queue-name">${esc(q.name)}</div>
          <div class="queue-wait">Menunggu ${waitMin < 1 ? '<1' : waitMin} menit</div>
        </div>
        <div class="queue-actions">
          <button class="q-btn q-btn-private" onclick="answerPrivate('${esc(q.name)}')">Privat</button>
          <button class="q-btn q-btn-all"     onclick="answerBroadcast('${esc(q.name)}')">Semua</button>
          <button class="q-btn q-btn-skip"    onclick="skipQueue('${esc(q.name)}')">Skip</button>
        </div>
      </div>`;
  }).join('');
}

/* ════════════════════════════════════════════════════════════
   SIGNAL SEND
════════════════════════════════════════════════════════════ */
async function signalSend(key, type, payload = {}) {
  const st = chState[key];
  if (!st?.roomData) return null;
  try {
    const res = await fetch(`${BASE_API}/signal`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ type, room: st.roomData.room, sender: 'admin', ...payload }),
    });
    return await res.json();
  } catch { return null; }
}

/* ════════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════════ */
async function apiFetch(url, opts = {}) { const r = await fetch(url, opts); return r.json(); }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 4500);
}
</script>
