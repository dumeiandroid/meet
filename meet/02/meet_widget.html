<script>
(function() {
  var jitsiAPI = null, selfStream = null, micEnabled = false;
  var timerInterval = null, pollInterval = null, meetStart = null;
  var handRaised = false, adminStatus = 'idle', queuePos = null;
  var roomData = null;
  var SIGNAL_POLL_MS = 2500;

  // Boot saat halaman load
  window.addEventListener('load', function() { startMeeting(); });

  /* ── Start meeting: ambil token lalu embed Jitsi ── */
  async function startMeeting() {
    try {
      var res = await fetch(MEET_BASE_API + '/join-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ roomName: MEET_ROOM, displayName: MEET_NAME, userEmail: '' }),
        signal: AbortSignal.timeout(8000)
      });
      var data = await res.json();
      if (!data.success || !data.token) { setRoomTag('Gagal join meeting'); return; }
      roomData = data;
    } catch(e) { setRoomTag('Server tidak tersedia'); return; }

    // Tampilkan widget dan ID peserta segera setelah token berhasil
    document.getElementById('float-widget').classList.add('active');
    if (typeof tampilTopBarId === 'function') tampilTopBarId();

    // Buka kamera
    try {
      selfStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('self-video').srcObject = selfStream;
      selfStream.getAudioTracks().forEach(function(t){ t.enabled = false; });
      document.getElementById('cam-off-overlay').classList.remove('show');
    } catch(e) {
      document.getElementById('cam-off-overlay').classList.add('show');
    }

    embedJitsi();
    meetStart = Date.now();
    timerInterval = setInterval(updateTimer, 1000);
    startSignalPoll();
    setRoomTag(MEET_ROOM);
  }

  /* ── Embed Jitsi tersembunyi ── */
  function embedJitsi() {
    // Tampilkan tombol join kecil
    document.getElementById('fm-join-btn').classList.add('visible');
    var tryEmbed = function() {
      if (typeof JitsiMeetExternalAPI === 'undefined') { setTimeout(tryEmbed, 400); return; }
      var token = (roomData.token || '').replace(/^"|"$/g,'').trim();
      var opts = {
        roomName: roomData.room,
        width: '100%', height: '100%',
        parentNode: document.getElementById('fm-jitsi-container'),
        jwt: token,
        configOverwrite: {
          startWithAudioMuted: true, startWithVideoMuted: false,
          prejoinPageEnabled: false, enableWelcomePage: false,
          toolbarButtons: [], filmstrip: { enabled: false }, disableTileView: true,
        },
        interfaceConfigOverwrite: {
          SHOW_JITSI_WATERMARK: false, SHOW_WATERMARK_FOR_GUESTS: false,
          TOOLBAR_ALWAYS_VISIBLE: false, FILM_STRIP_MAX_HEIGHT: 0,
        }
      };
      if (jitsiAPI) { try { jitsiAPI.dispose(); } catch(e){} }
      jitsiAPI = new JitsiMeetExternalAPI(roomData.domain, opts);
      jitsiAPI.addEventListener('videoConferenceJoined', function() {
        // Sembunyikan tombol join, tampilkan floating widget & FAB
        document.getElementById('fm-join-btn').classList.remove('visible');
        document.getElementById('fm-loading-dot').classList.remove('show');
        document.getElementById('float-widget').classList.add('active');
        document.getElementById('float-raise-btn').classList.add('active');
        document.getElementById('fab-meeting').classList.add('fab-visible');
        jitsiAPI.executeCommand('toggleAudio');
        // Kembalikan iframe ke background container (tetap terhubung, tidak terlihat)
        var modal    = document.getElementById('jitsi-modal');
        var body     = document.getElementById('jitsi-modal-body');
        var ph       = document.getElementById('jitsi-modal-placeholder');
        var wrap     = document.getElementById('fm-jitsi-wrap');
        var jitsiCon = document.getElementById('fm-jitsi-container');
        if (jitsiCon && body.contains(jitsiCon)) {
          wrap.appendChild(jitsiCon);
          ph.style.display = 'flex';
        }
        modal.classList.remove('open');
        var fab = document.getElementById('fab-meeting');
        if (fab) { fab.innerHTML = '🎥 Joint Meeting'; fab.style.background = '#2563eb'; }
      });
      jitsiAPI.addEventListener('videoConferenceLeft', function() { handleLeave(); });
      // Fallback 8 detik
      setTimeout(function() {
        document.getElementById('fm-join-btn').classList.remove('visible');
        document.getElementById('fm-loading-dot').classList.remove('show');
        document.getElementById('float-widget').classList.add('active');
        document.getElementById('float-raise-btn').classList.add('active');
        document.getElementById('fab-meeting').classList.add('fab-visible');
      }, 8000);
    };
    tryEmbed();
  }

  /* ── Toggle Meeting View (FAB) ── */
  window.toggleMeetingView = function() {
    var modal    = document.getElementById('jitsi-modal');
    var fab      = document.getElementById('fab-meeting');
    var body     = document.getElementById('jitsi-modal-body');
    var ph       = document.getElementById('jitsi-modal-placeholder');
    var jitsiCon = document.getElementById('fm-jitsi-container');
    var isOpen   = modal.classList.contains('open');
    if (isOpen) {
      // Tutup modal — kembalikan iframe ke background container
      if (jitsiCon && body.contains(jitsiCon)) {
        document.getElementById('fm-jitsi-wrap').appendChild(jitsiCon);
        ph.style.display = 'flex';
      }
      modal.classList.remove('open');
      if (fab) { fab.innerHTML = '🎥 Joint Meeting'; fab.style.background = '#2563eb'; }
    } else {
      // Buka modal — pindahkan iframe ke dalam modal
      if (jitsiCon) {
        ph.style.display = 'none';
        body.appendChild(jitsiCon);
        jitsiCon.style.width  = '100%';
        jitsiCon.style.height = '100%';
      }
      modal.classList.add('open');
      if (fab) { fab.innerHTML = '✕ Tutup Meeting'; fab.style.background = '#ef4444'; }
    }
  };

  /* ── Toggle Mic ── */
  function toggleMic() {
    if (!jitsiAPI) return;
    micEnabled = !micEnabled;
    jitsiAPI.executeCommand('toggleAudio');
    if (selfStream) selfStream.getAudioTracks().forEach(function(t){ t.enabled = micEnabled; });
    var btn = document.getElementById('btn-mic');
    if (micEnabled) { btn.innerHTML = '🎙️ Mic Hidup'; btn.classList.add('active'); }
    else            { btn.innerHTML = '🔇 Mic Mati';  btn.classList.remove('active'); }
  }

  /* ── Toggle popup kontrol ── */
  function toggleCtrlPopup() {
    document.getElementById('ctrl-popup').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    var popup = document.getElementById('ctrl-popup');
    var box   = document.getElementById('float-video-box');
    if (popup && box && !popup.contains(e.target) && !box.contains(e.target)) {
      popup.classList.remove('open');
    }
  });

  /* ── Raise Hand / Tanya Pengawas ── */
  function handleRaiseHand() {
    if (!roomData) return;
    var btn = document.getElementById('btn-raise');
    if (handRaised) {
      handRaised = false;
      btn.classList.remove('in-queue', 'cancel');
      btn.innerHTML = '🖐️ Tanya Pengawas';
      var frb = document.getElementById('float-raise-btn');
      if (frb) { frb.classList.remove('in-queue','cancel'); frb.innerHTML = '🖐️ Tanya Pengawas'; }
      var qi = document.getElementById('popup-queue-info'); if(qi) qi.classList.remove('show');
      signalSend('cancel-hand', { name: MEET_NAME });
      showToast('Pertanyaan dibatalkan.', 'info');
      return;
    }
    if (adminStatus === 'idle') { showToast('Pengawas sedang tidak aktif. Coba lagi nanti.', 'warn'); return; }
    handRaised = true;
    btn.classList.add('in-queue');
    btn.innerHTML = '⏳ Menunggu… (tap untuk batal)';
    var frb2 = document.getElementById('float-raise-btn');
    if (frb2) { frb2.classList.add('in-queue'); frb2.innerHTML = '⏳ Menunggu pengawas…'; }
    signalSend('raise-hand', { name: MEET_NAME }).then(function(res) {
      if (res && res.queuePos !== undefined) {
        if (res.queuePos === 0 && adminStatus === 'available') {
          showToast('Pengawas siap! Mic Anda akan dibuka.', 'success');
          btn.innerHTML = '🗣️ Sedang Bicara…'; btn.classList.remove('in-queue');
        } else {
          queuePos = res.queuePos;
          updateQueueDisplay(queuePos);
          btn.classList.add('cancel');
          btn.innerHTML = '⏳ Antrian #' + (queuePos + 1) + ' — tap untuk batal';
        }
      }
    });
  }

  function updateQueueDisplay(pos) {
    var wait = (pos + 1) * 2;
    var el = document.getElementById('popup-queue-info');
    if (el) { el.textContent = 'Antrian #' + (pos+1) + ' — estimasi ±' + wait + ' mnt'; el.classList.add('show'); }
    var frb = document.getElementById('float-raise-btn');
    if (frb) { frb.classList.add('cancel'); frb.innerHTML = '⏳ Antrian #' + (pos+1) + ' — tap batal'; }
  }

  /* ── Leave ── */
  function handleLeave() {
    if (!confirm('Yakin ingin keluar dari ruang ujian?')) return;
    if (handRaised) signalSend('cancel-hand', { name: MEET_NAME });
    if (jitsiAPI) { try { jitsiAPI.dispose(); } catch(e){} jitsiAPI = null; }
    if (selfStream) { selfStream.getTracks().forEach(function(t){ t.stop(); }); selfStream = null; }
    clearInterval(timerInterval); clearInterval(pollInterval);
    document.getElementById('float-widget').classList.remove('active');
    document.getElementById('float-raise-btn').classList.remove('active');
    document.getElementById('ctrl-popup').classList.remove('open');
    document.getElementById('fab-meeting').classList.remove('fab-visible');
    document.getElementById('jitsi-modal').classList.remove('open');
    roomData = null; handRaised = false; micEnabled = false;
  }

  /* ── Signal send & poll ── */
  function signalSend(type, payload) {
    if (!roomData) return Promise.resolve(null);
    return fetch(MEET_BASE_API + '/signal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ type: type, room: roomData.room, sender: MEET_NAME }, payload || {}))
    }).then(function(r){ return r.json(); }).catch(function(){ return null; });
  }

  function startSignalPoll() {
    pollInterval = setInterval(pollSignal, SIGNAL_POLL_MS);
    pollSignal();
  }

  function pollSignal() {
    if (!roomData) return;
    fetch(MEET_BASE_API + '/signal?room=' + encodeURIComponent(roomData.room) + '&participant=' + encodeURIComponent(MEET_NAME))
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (!data.success) return;
      // Admin status
      if (data.adminStatus !== undefined) {
        var prev = adminStatus;
        adminStatus = data.adminStatus;
        updateAdminStatusUI(adminStatus, prev);
      }
      // Queue position
      if (data.myQueue !== undefined && handRaised) {
        queuePos = data.myQueue;
        if (queuePos !== null) {
          updateQueueDisplay(queuePos);
          document.getElementById('btn-raise').innerHTML = '⏳ Antrian #' + (queuePos+1) + ' — tap untuk batal';
        }
      }
      // Private call
      if (data.answerPrivate && data.answerPrivate === MEET_NAME) {
        showToast('📞 Pengawas menghubungi Anda. Mic dibuka otomatis.', 'success');
        if (!micEnabled) toggleMic();
      }
      // Queue selesai
      if (data.queueDone && handRaised) {
        handRaised = false; queuePos = null;
        var btn = document.getElementById('btn-raise');
        btn.classList.remove('in-queue','cancel'); btn.innerHTML = '🖐️ Tanya Pengawas';
        var frb = document.getElementById('float-raise-btn');
        if (frb) { frb.classList.remove('in-queue','cancel'); frb.innerHTML = '🖐️ Tanya Pengawas'; }
        var qi = document.getElementById('popup-queue-info'); if(qi) qi.classList.remove('show');
        if (micEnabled) toggleMic();
        showToast('Sesi tanya jawab selesai. Mic Anda dinonaktifkan.', 'info');
      }
    }).catch(function(){});
  }

  function updateAdminStatusUI(status, prev) {
    var dot   = document.getElementById('popup-admin-dot');
    var fvDot = document.getElementById('fv-admin-dot');
    var text  = document.getElementById('admin-status-text');
    if (dot)   dot.className = '';
    if (fvDot) fvDot.className = 'fv-admin-dot';
    var map = {
      available: { cls: 'available', label: '🟢 Pengawas tersedia' },
      busy:      { cls: 'busy',      label: '🔴 Pengawas sedang bicara privat' },
      broadcast: { cls: 'broadcast', label: '📢 Pengawas sedang bicara ke semua' },
      idle:      { cls: 'idle',      label: '⏸️ Pengawas tidak aktif' },
    };
    var s = map[status] || map.idle;
    if (dot)   dot.classList.add(s.cls);
    if (fvDot) fvDot.classList.add(s.cls);
    if (text)  text.textContent = s.label;
    if (status === 'broadcast' && prev !== 'broadcast') showToast('📢 Pengawas sedang bicara kepada semua peserta.', 'warn');
  }

  /* ── Timer ── */
  function updateTimer() {
    var e = Math.floor((Date.now() - meetStart) / 1000);
    var m = String(Math.floor(e/60)).padStart(2,'0');
    var s = String(e%60).padStart(2,'0');
    var el = document.getElementById('meet-timer');
    if (el) el.textContent = m + ':' + s;
  }

  /* ── Toast ── */
  function showToast(msg, type) {
    var c = document.getElementById('fm-toast-container');
    var t = document.createElement('div');
    t.className = 'fm-toast ' + (type||'info');
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(function(){ t.remove(); },300); }, 4000);
  }

  function setRoomTag(txt) {
    var el = document.getElementById('float-room-tag');
    if (el) el.textContent = txt;
  }

  // Klik tombol Join di dalam iframe Jitsi
  window.fmClickJoin = function() {
    var btn = document.getElementById('fm-join-btn');
    if (btn) { btn.textContent = '⏳ Bergabung…'; btn.style.opacity = '0.7'; btn.disabled = true; }
    var container = document.getElementById('fm-jitsi-container');
    var iframe = container ? container.querySelector('iframe') : null;
    if (iframe) {
      try {
        var doc = iframe.contentDocument || iframe.contentWindow.document;
        var joinBtn = doc.querySelector('[data-testid="prejoin-join-button"]') ||
                      doc.querySelector('button[class*="joinButton"]') ||
                      doc.querySelector('.primary.medium');
        if (joinBtn) { joinBtn.click(); return; }
      } catch(e) {}
      iframe.contentWindow.postMessage({ type: 'join-meeting' }, '*');
    }
    if (jitsiAPI) { try { jitsiAPI.executeCommand('joinConference'); } catch(e) {} }
  };

  // Expose untuk update nama dari form
  window.fmUpdateName = function(namaBaru) {
    MEET_NAME = namaBaru;
    // Update display name di Jitsi
    if (jitsiAPI) { try { jitsiAPI.executeCommand('displayName', MEET_NAME); } catch(e){} }
    // Re-register ke server agar admin melihat nama yang benar
    fetch(MEET_BASE_API + '/join-room', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ roomName: MEET_ROOM, displayName: MEET_NAME, userEmail: '' })
    }).then(function(r){ return r.json(); }).then(function(data){
      if (data.success) {
        roomData = data;
        console.log('[Meet] Re-registered dengan nama:', MEET_NAME, '| room:', data.room);
      }
    }).catch(function(){});
  };

  // Expose toggleMic, handleRaiseHand, toggleCtrlPopup, handleLeave ke global
  window.toggleMic       = toggleMic;
  window.handleRaiseHand = handleRaiseHand;
  window.toggleCtrlPopup = toggleCtrlPopup;
  window.handleLeave     = handleLeave;
})();
</script>
